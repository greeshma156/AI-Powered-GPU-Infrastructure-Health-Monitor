global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "gpu_simulator"
    static_configs:
      - targets: ["gpu-simulator:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
