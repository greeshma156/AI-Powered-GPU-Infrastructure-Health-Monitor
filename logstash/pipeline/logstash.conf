input {
  udp {
    port => 5000
    codec => json
  }
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if [gpu_id] {
    mutate {
      add_tag => ["gpu_event"]
    }
  }
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "gpu-health-%{+YYYY.MM.dd}"
  }
}