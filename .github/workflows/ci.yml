name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint simulator
        run: flake8 simulator/simulator.py --max-line-length=120 --ignore=E501,E221,E241,E231

      - name: Lint ai_detector
        run: flake8 ai_detector/detector.py --max-line-length=120 --ignore=E501,E221,E241,E231

      - name: Lint recovery
        run: flake8 recovery/recovery.py --max-line-length=120 --ignore=E501,E221,E241,E231

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install prometheus_client requests pytest

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gpu-simulator
        uses: docker/build-push-action@v5
        with:
          context: ./simulator
          push: false
          tags: gpu-simulator:latest

      - name: Build ai-detector
        uses: docker/build-push-action@v5
        with:
          context: ./ai_detector
          push: false
          tags: ai-detector:latest

      - name: Build recovery-agent
        uses: docker/build-push-action@v5
        with:
          context: ./recovery
          push: false
          tags: recovery-agent:latest

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=test_key" > .env
          echo "ANTHROPIC_API_KEY=" >> .env

      - name: Start core services
        run: docker compose up -d gpu-simulator prometheus grafana alertmanager

      - name: Wait for services to be healthy
        run: sleep 30

      - name: Check simulator is serving metrics
        run: curl -f http://localhost:8000/metrics | grep dcgm_gpu_temp_celsius

      - name: Check Prometheus is scraping
        run: curl -f http://localhost:9090/-/healthy

      - name: Check Grafana is up
        run: curl -f http://localhost:3000/api/health

      - name: Tear down
        run: docker compose down
