global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "gpu_id"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"

receivers:
  - name: "default"
  - name: "critical"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["gpu_id"]